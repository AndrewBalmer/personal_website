<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>
  {%- if page.title and page.title != site.title -%}
    {{ page.title }} | {{ site.title }}
  {%- else -%}
    {{ site.title }} — {{ site.tagline }}
  {%- endif -%}
</title>

<!-- Google Fonts: Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- jekyll-seo-tag: injects <meta> description, Open Graph, Twitter card -->
{% seo %}

<!-- Canonical URL -->
<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- Favicon — replace favicon.svg with your own -->
<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">

<!-- Feed (jekyll-feed generates /feed.xml) -->
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">

{% if site.analytics.plausible_domain and site.analytics.plausible_domain != "" %}
<script defer data-domain="{{ site.analytics.plausible_domain }}" src="https://plausible.io/js/script.js"></script>
{% endif %}

{% if site.analytics.ga4_id and site.analytics.ga4_id != "" %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.analytics.ga4_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.analytics.ga4_id }}');
</script>
{% endif %}
