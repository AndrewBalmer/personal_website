name: Site Health

on:
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install pillow pyyaml reportlab requests

      - name: Generate derived assets
        run: |
          python3 scripts/build_cv_pdf.py
          python3 scripts/generate_social_card.py
          python3 scripts/optimize_images.py

      - name: Build site
        run: bundle exec jekyll build

      - name: Check publication sync
        run: ruby scripts/update_publications.rb --check

      - name: Check image optimization
        run: python3 scripts/optimize_images.py --check

      - name: Prepare project-site preview root
        run: |
          mkdir -p /tmp/personal-website-preview/personal_website
          cp -R _site/. /tmp/personal-website-preview/personal_website/

      - name: Start preview server
        run: python3 -m http.server 4000 --directory /tmp/personal-website-preview >/tmp/personal-website-http.log 2>&1 &

      - name: Pages smoke test
        run: python3 scripts/site_smoke_test.py http://127.0.0.1:4000/personal_website

      - name: Check site links
        run: python3 scripts/check_links.py --site-dir _site
