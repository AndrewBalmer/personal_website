- name: "Antimicrobial Resistance Cartography"
  slug: "antimicrobial-resistance-cartography"
  description: >
    A computational framework for analysing multivariate antimicrobial
    resistance phenotypes at population scale, with uncertainty-aware
    statistical modelling and genotype-phenotype mapping.
  url: ""
  github: "https://github.com/AndrewBalmer/AMR-cartography"
  paper_url: "https://www.biorxiv.org/content/10.1101/2025.09.12.675231v1"
  paper_doi: "10.1101/2025.09.12.675231"
  repo_visibility: "public"
  overview: >
    AMR Cartography is a first-author methods project focused on modelling
    complex resistance phenotypes as multivariate structures rather than
    treating each drug independently. The project combines statistical
    modelling, visualisation, and reproducible code for method development.
  current_status: >
    Public code and preprint are available and represent the main public entry
    point for the framework.
  public_access: >
    Public readers can inspect both the manuscript and reproducible repository.
