bios:
  short: >
    Andrew Balmer is a computational biologist and genomic data scientist whose
    work focuses on pathogen genomics, antimicrobial resistance, and
    reproducible scientific software for global health research.
  press: >
    Andrew Balmer is a computational biologist at the Wellcome Sanger
    Institute. His research combines large-scale pathogen genomics,
    multivariate statistical modelling, and scientific software to study
    infectious disease evolution, resistance surveillance, and translational
    decision-making in public health.
  talks: >
    Andrew Balmer is a computational biologist and genomic data scientist at
    the Wellcome Sanger Institute. He develops quantitative methods and
    reproducible workflows for pathogen genomics, with recent work spanning
    artemisinin resistance surveillance, antimicrobial resistance cartography,
    and vaccine-target discovery.
  jobs: >
    Andrew Balmer is a computational biologist trained at the University of
    Cambridge and currently based at the Wellcome Sanger Institute. He works
    across genomic epidemiology, quantitative modelling, and scientific
    software, with an emphasis on building reproducible tools and analyses that
    support high-impact research and public-health applications.
