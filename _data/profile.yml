bio: >
  Andrew Balmer is a computational biologist and genomic data scientist at the
  Wellcome Sanger Institute, where he is currently working in Josie Bryant's
  group. His research combines pathogen genomics, antimicrobial resistance
  modelling, genome-wide association analysis, and reproducible scientific
  software, with recent work spanning artemisinin resistance surveillance,
  multivariate AMR cartography, respiratory microbiome projects, and
  vaccine-target discovery.
